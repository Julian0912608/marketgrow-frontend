<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4f46e5" />
  <title>Offline - MarketGrow</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      width: 100%;
      text-align: center;
      padding: 40px 28px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
    }
    .icon {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: #4f46e5;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .icon svg { width: 36px; height: 36px; fill: white; }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }
    p {
      font-size: 15px;
      line-height: 1.55;
      color: #94a3b8;
      margin-bottom: 28px;
    }
    button {
      width: 100%;
      padding: 14px 24px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
      font-family: inherit;
    }
    button:hover { background: #4338ca; }
    button:active { background: #3730a3; }
    .small {
      font-size: 12px;
      color: #64748b;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M13 2L4.09 12.97a.5.5 0 0 0 .39.83H11l-1.74 7.91a.5.5 0 0 0 .87.39L19 11.05a.5.5 0 0 0-.39-.83H13L14.74 2.39A.5.5 0 0 0 13 2z"/>
      </svg>
    </div>
    <h1>You are offline</h1>
    <p>MarketGrow needs an internet connection to show your latest store data and AI briefings. Check your connection and try again.</p>
    <button onclick="window.location.reload()">Retry connection</button>
    <p class="small">MarketGrow caches your app shell so you can return as soon as you are back online.</p>
  </div>
</body>
</html>
